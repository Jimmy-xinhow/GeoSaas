name: CD

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/api

jobs:
  # ── Run CI first ────────────────────────────────────────
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  # ── Deploy Backend (Docker → GHCR) ─────────────────────
  deploy-api:
    name: Build & Push API Docker Image
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy Frontend (Vercel) ────────────────────────────
  deploy-web:
    name: Deploy Frontend to Vercel
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Checkout repository
        if: env.VERCEL_TOKEN != ''
        uses: actions/checkout@v4

      - name: Install pnpm
        if: env.VERCEL_TOKEN != ''
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.0

      - name: Setup Node.js
        if: env.VERCEL_TOKEN != ''
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install Vercel CLI
        if: env.VERCEL_TOKEN != ''
        run: pnpm add -g vercel

      - name: Pull Vercel environment
        if: env.VERCEL_TOKEN != ''
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build for production
        if: env.VERCEL_TOKEN != ''
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel
        if: env.VERCEL_TOKEN != ''
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

      - name: Skip Vercel CLI deploy
        if: env.VERCEL_TOKEN == ''
        run: |
          echo "VERCEL_TOKEN is not configured; skipping Vercel CLI deploy."
          echo "Vercel GitHub Integration is expected to deploy the frontend from this push."

  # ── Run DB Migrations ───────────────────────────────────
  migrate-db:
    name: Run Database Migrations
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.1.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Prisma migrate deploy
        run: pnpm --filter @geovault/database exec prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
